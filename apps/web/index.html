<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BooKBooK</title>
    <meta name="theme-color" content="#1C1F22" />
    <meta name="description" content="BooKBooK | 本を身近に。広がる交流。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="BooKBooK" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- APP_PREFERENCES_THEME_STORAGE_KEY — must match apps/web/src/_foundation/appPreferencesStorage.ts -->
    <script>
      (function () {
        try {
          switch (localStorage.getItem('bookbook.theme')) {
            case 'dark':
              document.documentElement.dataset.theme = 'dark';
              break;
            case 'light':
              document.documentElement.dataset.theme = 'light';
              break;
            default:
              if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.dataset.theme = 'dark';
              }
              break;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
